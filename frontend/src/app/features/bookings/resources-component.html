<mat-spinner *ngIf="isLoading"></mat-spinner>
<div *ngIf="!isLoading">
  <table mat-table [dataSource]="dataSource">

    <ng-container matColumnDef="resourceName">
      <th mat-header-cell *matHeaderCellDef> Name </th>
      <td mat-cell *matCellDef="let element"> {{element.resourceName}} </td>
    </ng-container>

    <ng-container matColumnDef="basePrice">
      <th mat-header-cell *matHeaderCellDef> Base Price </th>
      <td mat-cell *matCellDef="let element"> {{element.basePrice}} </td>
    </ng-container>

    <ng-container matColumnDef="priceUnit">
      <th mat-header-cell *matHeaderCellDef> Price Unit </th>
      <td mat-cell *matCellDef="let element"> {{element.priceUnit}} </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
  </table>

  <mat-paginator [pageSizeOptions]="[5, 10, 20]"
                 showFirstLastButtons
                 aria-label="Select page of periodic elements">
  </mat-paginator>
  <button mat-raised-button color="primary" (click)="goToBooking()">Create a booking</button>
  <p *ngIf="message">{{message}}</p>
</div>
