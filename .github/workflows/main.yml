name: Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v3

      - uses: google-github-actions/auth@v1
        with:
          workload_identity_provider: "projects/1088612741231/locations/global/workloadIdentityPools/github-actions-pool/providers/github-provider"
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - run: gcloud auth configure-docker

      - name: Build booking service
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/booking-service ./booking-service
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/booking-service

      - name: Build resource service
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/resource-service ./resource-service
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/resource-service

      - name: Build notification service
        run: |
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/notification-service ./notification-service
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/notification-service
